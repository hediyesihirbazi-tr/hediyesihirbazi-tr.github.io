        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function hediyeBul() {
            const kime = document.getElementById("kime").value;
            const ilgi = document.getElementById("ilgi").value;
            const butce = document.getElementById("butce").value;
            const loading = document.getElementById("loadingIcon");
            const results = document.getElementById("results-area");
            const container = document.getElementById("cards-container");
            const fallbackAlert = document.getElementById("fallback-alert");

            results.style.display = "none";
            loading.style.display = "block";
            container.innerHTML = "";
            fallbackAlert.style.display = "none";

            setTimeout(() => {
                loading.style.display = "none";
                results.style.display = "block";

                let tumHavuz = [];

                if (ilgi === "genel") {
                    const kategoriler = hediyeHavuzu[kime];
                    for (const kat in kategoriler) {
                        if (kategoriler[kat][butce]) {
                            tumHavuz = tumHavuz.concat(kategoriler[kat][butce]);
                        }
                    }
                } else {
                    if (hediyeHavuzu[kime] && hediyeHavuzu[kime][ilgi] && hediyeHavuzu[kime][ilgi][butce]) {
                        tumHavuz = [...hediyeHavuzu[kime][ilgi][butce]];
                    }
                }

                if (tumHavuz.length === 0) {
                    fallbackAlert.style.display = "block";
                    tumHavuz = [{t:"Gift Card",d:"Safe choice.",i:"fa-ticket",l:"amazon+gift+card"}];
                }

                const gosterilecekler = shuffleArray(tumHavuz).slice(0, 10);

                gosterilecekler.forEach(urun => {
                    const card = document.createElement("div");
                    card.className = "product-card";
                    
                    // Amazon Global Link Entegrasyonu
                    let targetUrl = urun.l.startsWith("http") ? urun.l : `https://www.amazon.com/s?k=${urun.l}`;

                    card.innerHTML = `
                        <div class="icon-box"><i class="fa-solid ${urun.i}"></i></div>
                        <div class="product-info">
                            <div class="product-title">${urun.t}</div>
                            <div class="product-desc">${urun.d}</div>
                        </div>
                        <a href="${targetUrl}" target="_blank" class="go-btn">Check Price ❯</a>
                    `;
                    container.appendChild(card);
                });
            }, 600);
        }
