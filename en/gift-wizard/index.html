        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- HAFIZA (STATE MANAGEMENT) DEĞİŞKENLERİ ---
        let globalPool = [];
        let currentIndex = 0;

        // "FIND THE GIFT" butonuna basıldığında havuzu kurar ve hafızaya alır
        function initSearch() {
            const kime = document.getElementById("kime").value;
            const ilgi = document.getElementById("ilgi").value;
            const butce = document.getElementById("butce").value;
            const loading = document.getElementById("loadingIcon");
            const results = document.getElementById("results-area");
            const fallbackAlert = document.getElementById("fallback-alert");
            const container = document.getElementById("cards-container");

            results.style.display = "none";
            loading.style.display = "block";
            fallbackAlert.style.display = "none";
            container.innerHTML = "";

            setTimeout(() => {
                loading.style.display = "none";
                results.style.display = "block";

                let rawPool = [];

                // 1. Birincil Veri Çekimi
                if (ilgi === "genel") {
                    for (const kat in hediyeHavuzu[kime]) {
                        if (hediyeHavuzu[kime][kat] && hediyeHavuzu[kime][kat][butce]) {
                            rawPool = rawPool.concat(hediyeHavuzu[kime][kat][butce]);
                        }
                    }
                } else {
                    if (hediyeHavuzu[kime][ilgi] && hediyeHavuzu[kime][ilgi][butce]) {
                        rawPool = [...hediyeHavuzu[kime][ilgi][butce]];
                    }
                }

                let showFallbackMessage = false;

                // 2. Çok Agresif Tamamlama Algoritması (Geniş havuz garantisi)
                if (rawPool.length < 25) {
                    showFallbackMessage = true;
                    // O kişinin genel kategorisinden ürün ekle
                    if (hediyeHavuzu[kime]["genel"] && hediyeHavuzu[kime]["genel"][butce]) {
                        rawPool = rawPool.concat(hediyeHavuzu[kime]["genel"][butce]);
                    }
                    // Hala 25'ten azsa o kişinin tüm diğer kategorilerinden ürün çek
                    if (rawPool.length < 25) {
                        for (const kat in hediyeHavuzu[kime]) {
                            if (kat !== ilgi && kat !== "genel" && hediyeHavuzu[kime][kat] && hediyeHavuzu[kime][kat][butce]) {
                                rawPool = rawPool.concat(hediyeHavuzu[kime][kat][butce]);
                            }
                        }
                    }
                }

                // 3. Kopya Filtreleme (Deduplication)
                globalPool = Array.from(new Map(rawPool.map(item => [item.t, item])).values());

                if (globalPool.length === 0) {
                    globalPool = [{t:"Amazon Gift Card",d:"Let them choose their perfect gift.",i:"fa-ticket",l:"amazon+gift+card"}];
                    showFallbackMessage = true;
                }

                if (showFallbackMessage && ilgi !== "genel") {
                    fallbackAlert.style.display = "block";
                }

                // Havuzu karıştır ve ilk sayfayı göster
                globalPool = shuffleArray(globalPool);
                currentIndex = 0; 
                renderNextItems();

            }, 600);
        }

        // "SHOW DIFFERENT OPTIONS" butonuna basıldığında sadece hafızadan sıradaki 10'luyu çeker
        function renderNextItems() {
            const container = document.getElementById("cards-container");
            container.innerHTML = ""; // Mevcut ekrandakileri sil

            // Eğer havuzun sonuna geldiysek, yeniden karıştır ve başa dön
            if (currentIndex >= globalPool.length) {
                globalPool = shuffleArray(globalPool);
                currentIndex = 0;
            }

            // Sıradaki 10 ürünü al
            const pageItems = globalPool.slice(currentIndex, currentIndex + 10);
            
            pageItems.forEach((urun, index) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.style.animationDelay = `${index * 0.05}s`; // Ufak bir geliş animasyonu
                
                let targetUrl = urun.l.startsWith("http") ? urun.l : `https://www.amazon.com/s?k=${urun.l}`;

                card.innerHTML = `
                    <div class="icon-box"><i class="fa-solid ${urun.i}"></i></div>
                    <div class="product-info">
                        <div class="product-title">${urun.t}</div>
                        <div class="product-desc">${urun.d}</div>
                    </div>
                    <a href="${targetUrl}" target="_blank" class="go-btn">Check Price ❯</a>
                `;
                container.appendChild(card);
            });

            // Bir sonraki tıklama için indeksi 10 ileri kaydır
            currentIndex += 10;
        }
